# ──────────────────────────────────────
#  Synapse AI Arena – Configuration
# ──────────────────────────────────────

app:
  title: "⚔️ Synapse AI Arena"
  page_title: "⚔️ Synapse-AI-Arena"
  layout: "wide"

ollama:
  host: "http://localhost:11434"          # Ollama API endpoint
  fallback_models:                        # Used when Ollama is unreachable
    - llama3
    - mistral
    - gemma:2b
    - phi3
    - gemma2

judge:
  model: "llama3"                         # Model used as the impartial judge
  system_prompt: "You are a fair and impartial judge."

defaults:
  temperature: 0.7
  top_p: 0.9
  num_ctx: 2048

history:
  db_path: "battle_history.json"          # TinyDB file for battle records
  max_records: 500
